<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --bg:#fafafa;
    --panel:#ffffff;
    --panel2:#f5f6f8;
    --gold:#0071e3;
    --gold-soft:#0071e3;
    --text:#1d1d1f;
    --sub:#86868b;
    --line:#e5e5ea;
    --green:#34c759;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:120px;
  }
  header{
    padding:28px 20px 18px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-size:18px;
    letter-spacing:.08em;
    margin:0 0 4px;
    color:var(--gold-soft);
    font-weight:600;
  }
  header p{
    margin:0;
    font-size:12px;
    color:var(--sub);
    letter-spacing:.05em;
  }

  .steps{
    display:flex;
    justify-content:center;
    gap:6px;
    padding:16px 20px 0;
  }
  .step-dot{
    flex:1;
    max-width:80px;
    height:3px;
    background:var(--line);
    border-radius:3px;
    transition:.3s;
  }
  .step-dot.active{ background:var(--gold); }
  .step-dot.done{ background:var(--gold-soft); }

  main{
    max-width:680px;
    margin:0 auto;
    padding:24px 20px 40px;
  }

  .panel{ display:none; }
  .panel.show{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .panel-title{
    font-size:15px;
    color:var(--gold-soft);
    margin:0 0 16px;
    letter-spacing:.04em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel-title .badge{
    font-size:11px;
    color:#ffffff;
    background:var(--gold);
    padding:2px 8px;
    border-radius:20px;
    font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .grid.cols-4{ grid-template-columns:repeat(2,1fr); }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 10px;
    text-align:center;
    cursor:pointer;
    transition:.18s;
    color:var(--text);
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .card:hover{ border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,113,227,.12); }
  .card.selected{
    border-color:var(--gold);
    background:#eaf3ff;
    box-shadow:0 0 0 1px var(--gold) inset;
  }
  .card .icon{
    width:32px; height:32px;
    margin:0 auto 10px;
    color:var(--sub);
    transition:.18s;
  }
  .card .icon svg{ width:100%; height:100%; display:block; }
  .card:hover .icon{ color:var(--gold); }
  .card.selected .icon{ color:var(--gold); }
  .card .label{ font-size:13px; font-weight:600; }
  .card .sub{ font-size:11px; color:var(--sub); margin-top:2px; }

  .list-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .list-card:hover{ border-color:var(--gold); }
  .list-card.selected{ border-color:var(--gold); background:#eaf3ff; }
  .list-card .name{ font-size:14px; font-weight:600; }
  .list-card .check{
    width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--sub);
    flex-shrink:0;
  }
  .list-card.selected .check{
    border-color:var(--gold);
    background:var(--gold);
  }

  .repair-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .repair-item.selected{ border-color:var(--gold); background:#eaf3ff; }
  .repair-item .left{ display:flex; align-items:center; gap:12px; }
  .repair-item .check{
    width:22px;height:22px;border-radius:6px;
    border:1.5px solid var(--sub);
    flex-shrink:0; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px; color:#ffffff;
  }
  .repair-item.selected .check{ border-color:var(--gold); background:var(--gold); }
  .repair-item .name{ font-size:14px; font-weight:600; }
  .repair-item .desc{ font-size:11px; color:var(--sub); margin-top:2px; }
  .repair-item .price{ font-size:14px; font-weight:700; color:var(--gold-soft); white-space:nowrap; }

  .nav-row{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .btn{
    flex:1;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:.04em;
  }
  .btn-back{
    background:transparent;
    border:1px solid var(--line);
    color:var(--sub);
  }
  .btn-back:hover{ border-color:var(--sub); color:var(--text); }
  .btn-next{
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));
    color:#ffffff;
  }
  .btn-next:disabled{
    background:var(--line);
    color:var(--sub);
    cursor:not-allowed;
  }

  /* 合計バー */
  .total-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .total-bar .label{ font-size:12px; color:var(--sub); }
  .total-bar .amount{ font-size:22px; font-weight:800; color:var(--gold-soft); }
  .total-bar .amount span{ font-size:13px; color:var(--sub); margin-left:4px; }

  /* 完了画面 */
  .summary{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
  }
  .summary-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .summary-row:last-child{ border-bottom:none; }
  .summary-row .sname{ color:var(--sub); }
  .summary-row .sval{ color:var(--text); font-weight:600; }
  .grand-total{
    margin-top:16px;
    padding-top:16px;
    border-top:1px solid var(--gold);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .grand-total .gt-label{ font-size:14px; color:var(--gold-soft); }
  .grand-total .gt-val{ font-size:28px; font-weight:800; color:var(--gold-soft); }

  .empty-note{
    text-align:center;
    color:var(--sub);
    font-size:12px;
    padding:30px 10px;
  }

  .factory-notice{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:#fff8e6;
    border:1px solid #f3d98b;
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:18px;
    font-size:12.5px;
    line-height:1.6;
    color:#6b5418;
  }
  .factory-notice .fn-icon{ font-size:16px; flex-shrink:0; }
  .factory-notice b{ font-weight:700; }

  .contact-box{
    margin-top:20px;
    text-align:center;
  }
  .contact-box a{
    display:inline-block;
    background:var(--gold);
    color:#ffffff;
    padding:14px 28px;
    border-radius:30px;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
  }
</style>
</head>

  </section>

  <!-- STEP2: シリーズ/モデル -->

    <div id="modelList"></div>
    <div class="nav-row">

    </div>
  </section>

  <!-- STEP3: 修理内容（複数選択） -->
  <section class="panel" data-step="3">
    <div id="factoryNotice"></div>
    <p class="panel-title"><span class="badge">STEP 3</span>修理内容を選んでください（複数選択可）</p>
    <div id="repairList"></div>

    <div id="waterproofSection">
      <p class="panel-title" style="margin-top:24px;"><span class="badge">オプション</span>防水パッキン交換は必要ですか？</p>
      <div class="grid" id="waterproofGrid"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-back" onclick="goStep(2)">戻る</button>
      <button class="btn btn-next" id="toStep4" onclick="goStep(4)" disabled>確認画面へ</button>
    </div>
  </section>

  <!-- STEP4: 確認・合計 -->
  <section class="panel" data-step="4">
    <p class="panel-title"><span class="badge">STEP 4</span>お見積り内容</p>
    <div class="summary" id="summaryBox"></div>
    <div id="factoryNoticeSummary"></div>
    <div class="contact-box">
      <a href="tel:090-7505-6181">📞 この内容で相談する（090-7505-6181）</a>
    </div>
    <div class="nav-row">
      <button class="btn btn-back" onclick="goStep(3)">修理内容を選び直す</button>
    </div>
  </section>

</main>

<div class="total-bar">

const PART_PRICE_TABLES = {
  screen:        Object.assign({}, SCREEN_BASE_PRICE, withSurcharge(IPAD_SCREEN, IPAD_SURCHARGE), IPAD2_SCREEN, ANDROID_SCREEN, IPOD_SCREEN, WATCH_SCREEN),
  glassOnly:     Object.assign({}, withSurcharge(IPAD_GLASS_ONLY, IPAD_SURCHARGE), IPAD2_GLASS_ONLY, IPOD_GLASS_ONLY),
  battery:       Object.assign({}, PART_BATTERY, withSurcharge(IPAD_BATTERY, IPAD_SURCHARGE), IPAD2_BATTERY, ANDROID_BATTERY, IPOD_BATTERY, WATCH_BATTERY),
  camera:        Object.assign({}, PART_CAMERA, withSurcharge(IPAD_CAMERA, IPAD_SURCHARGE), IPAD2_CAMERA, IPOD_CAMERA),
  frontCamera:   Object.assign({}, PART_FRONT_CAMERA, withSurcharge(IPAD_FRONT_CAMERA, IPAD_SURCHARGE), IPAD2_FRONT_CAMERA, IPOD_FRONT_CAMERA),
  charge:        Object.assign({}, PART_CHARGE, withSurcharge(IPAD_CHARGE, IPAD_SURCHARGE), IPAD2_CHARGE, ANDROID_CHARGE, IPOD_CHARGE),
  speaker:       Object.assign({}, PART_SPEAKER, withSurcharge(IPAD_SPEAKER, IPAD_SURCHARGE), IPAD2_SPEAKER, IPOD_SPEAKER),
  homeButton:    Object.assign({}, PART_HOME_BUTTON, withSurcharge(IPAD_HOME_BUTTON, IPAD_SURCHARGE), IPAD2_HOME_BUTTON, IPOD_HOME_BUTTON),
  vibrator:      Object.assign({}, PART_VIBRATOR),
  topButton:     Object.assign({}, PART_TOP_BUTTON, withSurcharge(IPAD_TOP_BUTTON, IPAD_SURCHARGE), IPAD2_TOP_BUTTON, IPOD_TOP_BUTTON),
  headphoneJack: Object.assign({}, withSurcharge(IPAD_HEADPHONE_JACK, IPAD_SURCHARGE), IPAD2_HEADPHONE_JACK, IPOD_HEADPHONE_JACK),
};

// ホームボタンはTouch ID搭載機種にのみ存在するため、データが無い機種では項目自体を非表示にする
const HIDE_IF_NO_DATA = ['homeButton', 'headphoneJack', 'glassOnly'];

// 価格表（画像）に存在しない独自メニュー項目。iPhone以外では表示しない
const IPHONE_ONLY_EXTRA_ITEMS = ['back', 'vibrator', 'water'];

// 機種カテゴリごとに、価格表（画像）に存在する項目だけを許可するホワイトリスト
// 未指定のカテゴリ（iPhone, tablet等）は制限なし
const ALLOWED_ITEMS_BY_DEVICE = {
  android:    ['screen', 'battery', 'charge'],
  applewatch: ['screen', 'battery'],
};

// 防水パッキンを取り扱っていない機種（iPhone 5〜7シリーズ）
const NO_WATERPROOF_MODELS = [
  'iPhone 5', 'iPhone 5c', 'iPhone 5s / SE（第1世代）',
  'iPhone 6', 'iPhone 6 Plus', 'iPhone 6s', 'iPhone 6s Plus',
  'iPhone 7', 'iPhone 7 Plus',
];

// モデル別データテーブルが整備済みの機種カテゴリ
const TABLE_READY_DEVICE_TYPES = ['iphone', 'ipad', 'android', 'ipod', 'applewatch'];

// 指定した修理項目の、現在選択中モデルでの価格を返す。データが無ければ null（要問い合わせ）
// 全カテゴリ共通の追加サーチャージ
function getItemPrice(item){
  if(TABLE_READY_DEVICE_TYPES.includes(state.deviceType) && item.modelPriceKey){
    const table = PART_PRICE_TABLES[item.modelPriceKey];
    if(table && table[state.model] != null) return table[state.model];
    return null; // 要問い合わせ
  }
  return item.price;
}

/* =========================================================== */

let state = { deviceType:null, model:null, brand:null, repairs:[], waterproof:null, screenGrade:null };

function fmt(n){ return '¥' + n.toLocaleString(); }

// STEP1描画
const deviceGrid = document.getElementById('deviceGrid');
DEVICE_TYPES.forEach(d=>{
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<div class="icon">${d.icon}</div><span class="label">${d.label}</span>`;
  el.onclick = () => selectDevice(d.id, el);
  deviceGrid.appendChild(el);
});

function selectDevice(id, el){
  state.deviceType = id;
  state.model = null;
  state.brand = null;
  document.querySelectorAll('#deviceGrid .card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  renderModels();
  setTimeout(()=>goStep(2), 150);
}

function renderModels(){
  const wrap = document.getElementById('modelList');
  wrap.innerHTML = '';

  // Android はメーカー（ブランド）を先に選んでもらう
  if(state.deviceType === 'android' && !state.brand){
    Object.keys(ANDROID_BRANDS).forEach(brand=>{
      const el = document.createElement('div');
      el.className = 'list-card';
      el.innerHTML = `<span class="name">${brand}</span><span class="check"></span>`;
      el.onclick = () => {
        state.brand = brand;
        renderModels();
      };
      wrap.appendChild(el);
    });
    return;
  }

  // Android かつブランド選択済みなら「戻る」リンクを表示
  if(state.deviceType === 'android' && state.brand){
    const backEl = document.createElement('div');
    backEl.style.cssText = 'padding:4px 0 14px; font-size:13px; color:var(--gold-soft); cursor:pointer;';
    backEl.textContent = '← メーカー選択に戻る';
    backEl.onclick = () => { state.brand = null; renderModels(); };
    wrap.appendChild(backEl);
  }

  const modelSource = (state.deviceType === 'android' && state.brand)
    ? ANDROID_BRANDS[state.brand]
    : (MODELS[state.deviceType] || []);

  modelSource.forEach(m=>{
    const el = document.createElement('div');
    el.className = 'list-card';
    el.innerHTML = `<span class="name">${m}</span><span class="check"></span>`;
    el.onclick = () => {
      state.model = m;
      state.repairs = [];
      state.waterproof = null;
      state.screenGrade = null;
      document.querySelectorAll('#modelList .list-card').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      renderRepairs();
      updateTotal();
      document.getElementById('toStep4').disabled = true;
      setTimeout(()=>goStep(3), 150);
    };
    wrap.appendChild(el);
  });
}

function renderRepairs(){
  const wrap = document.getElementById('repairList');
  wrap.innerHTML = '';

  const noticeBox = document.getElementById('factoryNotice');
  if(['ipad','android','tablet','ipod','applewatch'].includes(state.deviceType)){
    noticeBox.innerHTML = `
      <div class="factory-notice">
        <span class="fn-icon">⚠️</span>
        <span>
          <b>提携の専門工場での修理となります。</b><br>
          お預かり期間：<b>1週間〜</b>が目安です。お急ぎの場合は事前にご相談ください。<br>
          ※実機の状態を工場で確認のうえ最終金額が決定するため、<b>こちらは確定の見積りではございません。</b>診断の結果、金額が変動する場合がございます。
        </span>
      </div>
    `;
  } else {
    noticeBox.innerHTML = '';
  }

  REPAIR_MENU.forEach(r=>{
    // 価格表（画像）に存在しない独自項目は、iPhone以外では表示しない
    if(IPHONE_ONLY_EXTRA_ITEMS.includes(r.id) && state.deviceType !== 'iphone'){
      return;
    }
    // 機種カテゴリごとのホワイトリストに無い項目は表示しない
    const allowList = ALLOWED_ITEMS_BY_DEVICE[state.deviceType];
    if(allowList && !allowList.includes(r.id)){
      return;
    }

    const price = getItemPrice(r);

    // データが無く、かつ「項目自体を隠す」対象（ホームボタンなど物理的に存在しない機種）
    if(price === null && HIDE_IF_NO_DATA.includes(r.id) && TABLE_READY_DEVICE_TYPES.includes(state.deviceType)){
      return;
    }

    const el = document.createElement('div');
    el.className = 'repair-item';

    if(price === null){
      el.style.opacity = '0.55';
      el.innerHTML = `
        <div class="left">
          <div class="check" style="visibility:hidden;"></div>
          <div>
            <div class="name">${r.name}</div>
            <div class="desc">準備中のため店頭・お電話でご確認ください</div>
          </div>
        </div>
        <div class="price" style="font-size:12px;color:var(--sub);">要問い合わせ</div>
      `;
      wrap.appendChild(el);
      return;
    }

    el.innerHTML = `
      <div class="left">
        <div class="check"></div>
        <div>
          <div class="name">${r.name}</div>
          <div class="desc">${r.desc}</div>
        </div>
      </div>
      <div class="price">${fmt(price)}〜</div>
    `;
    el.onclick = () => toggleRepair(r.id, el);
    wrap.appendChild(el);
  });
  renderWaterproof();
}

function renderWaterproof(){
  const section = document.getElementById('waterproofSection');
  const wrap = document.getElementById('waterproofGrid');

  if(state.deviceType !== 'iphone' || NO_WATERPROOF_MODELS.includes(state.model)){
    section.style.display = 'none';
    state.waterproof = null;
    return;
  }
  section.style.display = '';

  wrap.innerHTML = '';
  const options = [
    { val:true,  label:'必要',   sub:fmt(WATERPROOF_OPTION.price) },
    { val:false, label:'不要',   sub:'追加料金なし' },
  ];
  options.forEach(opt=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<span class="label">${opt.label}</span><span class="sub">${opt.sub}</span>`;
    if(state.waterproof === opt.val) el.classList.add('selected');
    el.onclick = () => {
      state.waterproof = opt.val;
      document.querySelectorAll('#waterproofGrid .card').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      updateTotal();
    };
    wrap.appendChild(el);
  });
}

function toggleRepair(id, el){
  const idx = state.repairs.indexOf(id);
  if(idx === -1){
    state.repairs.push(id);
    el.classList.add('selected');
  } else {
    state.repairs.splice(idx,1);
    el.classList.remove('selected');
  }
  updateTotal();
  document.getElementById('toStep4').disabled = state.repairs.length === 0;
}

function calcTotal(){
  let total = state.repairs.reduce((sum,id)=>{
    const item = REPAIR_MENU.find(r=>r.id===id);
    if(!item) return sum;
    const price = getItemPrice(item);
    return sum + (price || 0);
  }, 0);
  if(state.repairs.length > 0){
    total += WORK_FEE.price;
  }
  if(state.waterproof === true){
    total += WATERPROOF_OPTION.price;
  }
  return total;
}

function updateTotal(){
  document.getElementById('liveTotal').innerHTML = fmt(calcTotal()) + '<span>（税込）</span>';
}

function renderSummary(){
  const box = document.getElementById('summaryBox');
  const deviceLabel = DEVICE_TYPES.find(d=>d.id===state.deviceType)?.label || '-';
  let rows = `
    <div class="summary-row"><span class="sname">機種カテゴリ</span><span class="sval">${deviceLabel}</span></div>
    <div class="summary-row"><span class="sname">モデル</span><span class="sval">${state.model || '-'}</span></div>
  `;
  state.repairs.forEach(id=>{
    const item = REPAIR_MENU.find(r=>r.id===id);
    const price = getItemPrice(item);
    rows += `<div class="summary-row"><span class="sname">${item.name}</span><span class="sval">${price !== null ? fmt(price)+'〜' : '要問い合わせ'}</span></div>`;
  });
  if(state.repairs.length > 0){
    const feeLabel = state.deviceType === 'iphone' ? WORK_FEE.name : '荷造り運賃/手数料';
    rows += `<div class="summary-row"><span class="sname">${feeLabel}</span><span class="sval">${fmt(WORK_FEE.price)}</span></div>`;
  }
  if(state.waterproof === true){
    rows += `<div class="summary-row"><span class="sname">${WATERPROOF_OPTION.name}</span><span class="sval">${fmt(WATERPROOF_OPTION.price)}</span></div>`;
  } else if(state.waterproof === false){
    rows += `<div class="summary-row"><span class="sname">${WATERPROOF_OPTION.name}</span><span class="sval">不要</span></div>`;
  }
  box.innerHTML = rows + `
    <div class="grand-total">
      <span class="gt-label">お見積り合計（税込）</span>
      <span class="gt-val">${fmt(calcTotal())}</span>
    </div>
  `;

  const summaryNotice = document.getElementById('factoryNoticeSummary');
  if(['ipad','android','tablet','ipod','applewatch'].includes(state.deviceType)){
    summaryNotice.innerHTML = `
      <div class="factory-notice" style="margin-top:16px;">
        <span class="fn-icon">⚠️</span>
        <span>
          提携の専門工場での修理となります。実機確認後に金額が変動する場合があるため、<b>こちらは確定の見積りではございません。</b>
        </span>
      </div>
    `;
  } else {
    summaryNotice.innerHTML = '';
  }
}

function goStep(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.querySelector(`.panel[data-step="${n}"]`).classList.add('show');
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active', i+1===n);
    d.classList.toggle('done', i+1<n);
  });
  if(n===4) renderSummary();
  window.scrollTo({top:0, behavior:'smooth'});
}
