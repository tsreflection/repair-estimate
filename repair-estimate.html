<style>
  :root{
    --bg:#fafafa;
    --panel:#ffffff;
    --panel2:#f5f6f8;
    --gold:#0071e3;
    --gold-soft:#0071e3;
    --text:#1d1d1f;
    --sub:#86868b;
    --line:#e5e5ea;
    --green:#34c759;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:120px;
  }
  header{
    padding:28px 20px 18px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-size:18px;
    letter-spacing:.08em;
    margin:0 0 4px;
    color:var(--gold-soft);
    font-weight:600;
  }
  header p{
    margin:0;
    font-size:12px;
    color:var(--sub);
    letter-spacing:.05em;
  }

  .steps{
    display:flex;
    justify-content:center;
    gap:6px;
    padding:16px 20px 0;
  }
  .step-dot{
    flex:1;
    max-width:80px;
    height:3px;
    background:var(--line);
    border-radius:3px;
    transition:.3s;
  }
  .step-dot.active{ background:var(--gold); }
  .step-dot.done{ background:var(--gold-soft); }

  main{
    max-width:680px;
    margin:0 auto;
    padding:24px 20px 40px;
  }

  .panel{ display:none; }
  .panel.show{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .panel-title{
    font-size:15px;
    color:var(--gold-soft);
    margin:0 0 16px;
    letter-spacing:.04em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel-title .badge{
    font-size:11px;
    color:#ffffff;
    background:var(--gold);
    padding:2px 8px;
    border-radius:20px;
    font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .grid.cols-4{ grid-template-columns:repeat(2,1fr); }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 10px;
    text-align:center;
    cursor:pointer;
    transition:.18s;
    color:var(--text);
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .card:hover{ border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,113,227,.12); }
  .card.selected{
    border-color:var(--gold);
    background:#eaf3ff;
    box-shadow:0 0 0 1px var(--gold) inset;
  }
  .card .icon{
    width:32px; height:32px;
    margin:0 auto 10px;
    color:var(--sub);
    transition:.18s;
  }
  .card .icon svg{ width:100%; height:100%; display:block; }
  .card:hover .icon{ color:var(--gold); }
  .card.selected .icon{ color:var(--gold); }
  .card .label{ font-size:13px; font-weight:600; }
  .card .sub{ font-size:11px; color:var(--sub); margin-top:2px; }

  .list-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .list-card:hover{ border-color:var(--gold); }
  .list-card.selected{ border-color:var(--gold); background:#eaf3ff; }
  .list-card .name{ font-size:14px; font-weight:600; }
  .list-card .check{
    width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--sub);
    flex-shrink:0;
  }
  .list-card.selected .check{
    border-color:var(--gold);
    background:var(--gold);
  }

  .repair-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .repair-item.selected{ border-color:var(--gold); background:#eaf3ff; }
  .repair-item .left{ display:flex; align-items:center; gap:12px; }
  .repair-item .check{
    width:22px;height:22px;border-radius:6px;
    border:1.5px solid var(--sub);
    flex-shrink:0; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px; color:#ffffff;
  }
  .repair-item.selected .check{ border-color:var(--gold); background:var(--gold); }
  .repair-item .name{ font-size:14px; font-weight:600; }
  .repair-item .desc{ font-size:11px; color:var(--sub); margin-top:2px; }
  .repair-item .price{ font-size:14px; font-weight:700; color:var(--gold-soft); white-space:nowrap; }

  .nav-row{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .btn{
    flex:1;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:.04em;
  }
  .btn-back{
    background:transparent;
    border:1px solid var(--line);
    color:var(--sub);
  }
  .btn-back:hover{ border-color:var(--sub); color:var(--text); }
  .btn-next{
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));
    color:#ffffff;
  }
  .btn-next:disabled{
    background:var(--line);
    color:var(--sub);
    cursor:not-allowed;
  }

  /* 合計バー */
  .total-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .total-bar .label{ font-size:12px; color:var(--sub); }
  .total-bar .amount{ font-size:22px; font-weight:800; color:var(--gold-soft); }
  .total-bar .amount span{ font-size:13px; color:var(--sub); margin-left:4px; }

  /* 完了画面 */
  .summary{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
  }
  .summary-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .summary-row:last-child{ border-bottom:none; }
  .summary-row .sname{ color:var(--sub); }
  .summary-row .sval{ color:var(--text); font-weight:600; }
  .grand-total{
    margin-top:16px;
    padding-top:16px;
    border-top:1px solid var(--gold);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .grand-total .gt-label{ font-size:14px; color:var(--gold-soft); }
  .grand-total .gt-val{ font-size:28px; font-weight:800; color:var(--gold-soft); }

  .empty-note{
    text-align:center;
    color:var(--sub);
    font-size:12px;
    padding:30px 10px;
  }

  .contact-box{
    margin-top:20px;
    text-align:center;
  }
  .contact-box a{
    display:inline-block;
    background:var(--gold);
    color:#ffffff;
    padding:14px 28px;
    border-radius:30px;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
  }
</style>

// 防水パッキン交換：必要かどうかをユーザーに選んでもらう（価格は要調整）
const WATERPROOF_OPTION = { id:'waterproof', name:'防水パッキン交換', desc:'防水・防塵性能の維持に必要な場合があります', price:1650 };

// 画面（フロントパネル）モデル別ベース価格：エアレジCSV「カテゴリ1」より自動反映（外税→税込10%換算）
// 「〜」表示の基本料金。OLED等のランクアップは店頭で口頭説明。
// ※ベースのLCDを扱っていない機種は「高品質LCD」が実質ベース価格
const SCREEN_BASE_PRICE = {
  'iPhone 16 Pro Max': 55000,  // 税抜50,000
  'iPhone 16 Pro':     47300,  // 税抜43,000
  'iPhone 16 Plus':    38500,  // 税抜35,000（高品質LCDが実質ベース）
  'iPhone 16':          35200,  // 税抜32,000（高品質LCDが実質ベース）
  'iPhone 15 Pro Max': 35860,  // 税抜32,600
  'iPhone 15 Pro':     29810,  // 税抜27,100
  'iPhone 15 Plus':    27830,  // 税抜25,300
  'iPhone 15':          26840,  // 税抜24,400
  'iPhone 14 Pro Max': 32890,  // 税抜29,900
  'iPhone 14 Pro':     27830,  // 税抜25,300
  'iPhone 14 Plus':    22880,  // 税抜20,800（高品質LCDが実質ベース）
  'iPhone 14':          21780,  // 税抜19,800
  'iPhone 13 Pro Max': 26840,  // 税抜24,400
  'iPhone 13 Pro':     24860,  // 税抜22,600（高品質LCDが実質ベース）
  'iPhone 13':          12870,  // 税抜11,700
  'iPhone 13 mini':    13310,  // 税抜12,100
  'iPhone SE（第3世代）': 8360,  // 税抜7,600（高品質LCDが実質ベース）
  'iPhone 12 Pro Max': 13860,  // 税抜12,600（高品質LCDが実質ベース）
  'iPhone 12 / 12 Pro': 11880,  // 税抜10,800
  'iPhone 12 mini':    12320,  // 税抜11,200
  'iPhone 11 Pro Max': 9900,   // 税抜9,000
  'iPhone 11 Pro':     9130,   // 税抜8,300
  'iPhone 11':          8800,   // 税抜8,000
  'iPhone SE（第2世代）': 5830,  // 税抜5,300
  'iPhone XR':          8800,   // 税抜8,000
  'iPhone XS Max':     10890,  // 税抜9,900
  'iPhone XS':          8030,   // 税抜7,300
  'iPhone X':           8030,   // 税抜7,300
  'iPhone 8 Plus':      6160,   // 税抜5,600
  'iPhone 8':           5170,   // 税抜4,700
  'iPhone 7 Plus':      6160,   // 税抜5,600
  'iPhone 7':           5170,   // 税抜4,700
  'iPhone 6s Plus':     5170,   // 税抜4,700
  'iPhone 6s':          4840,   // 税抜4,400
  'iPhone 6 Plus':      5390,   // 税抜4,900
  'iPhone 6':           5170,   // 税抜4,700
  'iPhone 5s / SE（第1世代）': 5060, // 税抜4,600
  'iPhone 5c':          5060,   // 税抜4,600
  'iPhone 5':           5060,   // 税抜4,600
};

// 価格データがまだ無い機種（店頭確認扱い）
const SCREEN_PRICE_TBD = ['iPhone 17 / 17 Pro / 17 Pro Max', 'iPhone 16e'];

// modelPriceKey と実データの対応表
const PART_PRICE_TABLES = {
  screen:      SCREEN_BASE_PRICE,
  battery:     PART_BATTERY,
  camera:      PART_CAMERA,
  frontCamera: PART_FRONT_CAMERA,
  charge:      PART_CHARGE,
  speaker:     PART_SPEAKER,
  homeButton:  PART_HOME_BUTTON,
  vibrator:    PART_VIBRATOR,
  topButton:   PART_TOP_BUTTON,
};

// ホームボタンはTouch ID搭載機種にのみ存在するため、データが無い機種では項目自体を非表示にする
const HIDE_IF_NO_DATA = ['homeButton'];

// 防水パッキンを取り扱っていない機種（iPhone 5〜7シリーズ）
const NO_WATERPROOF_MODELS = [
  'iPhone 5', 'iPhone 5c', 'iPhone 5s / SE（第1世代）',
  'iPhone 6', 'iPhone 6 Plus', 'iPhone 6s', 'iPhone 6s Plus',
  'iPhone 7', 'iPhone 7 Plus',
];

// 指定した修理項目の、現在選択中モデルでの価格を返す。データが無ければ null（要問い合わせ）
function getItemPrice(item){
  if(state.deviceType === 'iphone' && item.modelPriceKey){
    const table = PART_PRICE_TABLES[item.modelPriceKey];
    if(table && table[state.model] != null) return table[state.model];
    return null; // 要問い合わせ
  }
  return item.price; // iPhone以外は暫定の固定価格を使用
}

/* =========================================================== */

let state = { deviceType:null, model:null, repairs:[], waterproof:null, screenGrade:null };

function fmt(n){ return '¥' + n.toLocaleString(); }

// STEP1描画
const deviceGrid = document.getElementById('deviceGrid');
DEVICE_TYPES.forEach(d=>{
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<div class="icon">${d.icon}</div><span class="label">${d.label}</span>`;
  el.onclick = () => selectDevice(d.id, el);
  deviceGrid.appendChild(el);
});

function selectDevice(id, el){
  state.deviceType = id;
  state.model = null;
  document.querySelectorAll('#deviceGrid .card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  renderModels();
  setTimeout(()=>goStep(2), 150);
}

function renderModels(){
  const wrap = document.getElementById('modelList');
  wrap.innerHTML = '';
  (MODELS[state.deviceType] || []).forEach(m=>{
    const el = document.createElement('div');
    el.className = 'list-card';
    el.innerHTML = `<span class="name">${m}</span><span class="check"></span>`;
    el.onclick = () => {
      state.model = m;
      state.repairs = [];
      state.waterproof = null;
      state.screenGrade = null;
      document.querySelectorAll('#modelList .list-card').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      renderRepairs();
      updateTotal();
      document.getElementById('toStep4').disabled = true;
      setTimeout(()=>goStep(3), 150);
    };
    wrap.appendChild(el);
  });
}

function renderRepairs(){
  const wrap = document.getElementById('repairList');
  wrap.innerHTML = '';

  REPAIR_MENU.forEach(r=>{
    const price = getItemPrice(r);

    // データが無く、かつ「項目自体を隠す」対象（ホームボタンなど物理的に存在しない機種）
    if(price === null && HIDE_IF_NO_DATA.includes(r.id) && state.deviceType === 'iphone'){
      return;
    }

    const el = document.createElement('div');
    el.className = 'repair-item';

    if(price === null){
      el.style.opacity = '0.55';
      el.innerHTML = `
        <div class="left">
          <div class="check" style="visibility:hidden;"></div>
          <div>
            <div class="name">${r.name}</div>
            <div class="desc">準備中のため店頭・お電話でご確認ください</div>
          </div>
        </div>
        <div class="price" style="font-size:12px;color:var(--sub);">要問い合わせ</div>
      `;
      wrap.appendChild(el);
      return;
    }

    el.innerHTML = `
      <div class="left">
        <div class="check"></div>
        <div>
          <div class="name">${r.name}</div>
          <div class="desc">${r.desc}</div>
        </div>
      </div>
      <div class="price">${fmt(price)}〜</div>
    `;
    el.onclick = () => toggleRepair(r.id, el);
    wrap.appendChild(el);
  });
  renderWaterproof();
}

function renderWaterproof(){
  const section = document.getElementById('waterproofSection');
  const wrap = document.getElementById('waterproofGrid');

  if(NO_WATERPROOF_MODELS.includes(state.model)){
    section.style.display = 'none';
    state.waterproof = null;
    return;
  }
  section.style.display = '';

  wrap.innerHTML = '';
  const options = [
    { val:true,  label:'必要',   sub:fmt(WATERPROOF_OPTION.price) },
    { val:false, label:'不要',   sub:'追加料金なし' },
  ];
  options.forEach(opt=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<span class="label">${opt.label}</span><span class="sub">${opt.sub}</span>`;
    if(state.waterproof === opt.val) el.classList.add('selected');
    el.onclick = () => {
      state.waterproof = opt.val;
      document.querySelectorAll('#waterproofGrid .card').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      updateTotal();
    };
    wrap.appendChild(el);
  });
}

function toggleRepair(id, el){
  const idx = state.repairs.indexOf(id);
  if(idx === -1){
    state.repairs.push(id);
    el.classList.add('selected');
  } else {
    state.repairs.splice(idx,1);
    el.classList.remove('selected');
  }
  updateTotal();
  document.getElementById('toStep4').disabled = state.repairs.length === 0;
}

function calcTotal(){
  let total = state.repairs.reduce((sum,id)=>{
    const item = REPAIR_MENU.find(r=>r.id===id);
    if(!item) return sum;
    const price = getItemPrice(item);
    return sum + (price || 0);
  }, 0);
  if(state.repairs.length > 0){
    total += WORK_FEE.price;
  }
  if(state.waterproof === true){
    total += WATERPROOF_OPTION.price;
  }
  return total;
}

function updateTotal(){
  document.getElementById('liveTotal').innerHTML = fmt(calcTotal()) + '<span>（税込）</span>';
}

function renderSummary(){
  const box = document.getElementById('summaryBox');
  const deviceLabel = DEVICE_TYPES.find(d=>d.id===state.deviceType)?.label || '-';
  let rows = `
    <div class="summary-row"><span class="sname">機種カテゴリ</span><span class="sval">${deviceLabel}</span></div>
    <div class="summary-row"><span class="sname">モデル</span><span class="sval">${state.model || '-'}</span></div>
  `;
  state.repairs.forEach(id=>{
    const item = REPAIR_MENU.find(r=>r.id===id);
    const price = getItemPrice(item);
    rows += `<div class="summary-row"><span class="sname">${item.name}</span><span class="sval">${price !== null ? fmt(price)+'〜' : '要問い合わせ'}</span></div>`;
  });
  if(state.repairs.length > 0){
    rows += `<div class="summary-row"><span class="sname">${WORK_FEE.name}</span><span class="sval">${fmt(WORK_FEE.price)}</span></div>`;
  }
  if(state.waterproof === true){
    rows += `<div class="summary-row"><span class="sname">${WATERPROOF_OPTION.name}</span><span class="sval">${fmt(WATERPROOF_OPTION.price)}</span></div>`;
  } else if(state.waterproof === false){
    rows += `<div class="summary-row"><span class="sname">${WATERPROOF_OPTION.name}</span><span class="sval">不要</span></div>`;
  }
  box.innerHTML = rows + `
    <div class="grand-total">
      <span class="gt-label">お見積り合計（税込）</span>
      <span class="gt-val">${fmt(calcTotal())}</span>
    </div>
  `;
}

function goStep(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.querySelector(`.panel[data-step="${n}"]`).classList.add('show');
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active', i+1===n);
    d.classList.toggle('done', i+1<n);
  });
  if(n===4) renderSummary();
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
